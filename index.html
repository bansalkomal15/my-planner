<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Planner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%234C8C3C%22/><text x=%2250%22 y=%2266%22 font-size=%2258%22 text-anchor=%22middle%22>🗓️</text></svg>" />
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: linear-gradient(180deg,#F8F4E9,#EFE7D3); min-height: 100vh; color: #1A1A17; }
  input:focus, button:focus { outline: none; }
  @keyframes confetti-fall { 0%{transform:translateY(-12vh) rotate(0)} 100%{transform:translateY(105vh) rotate(720deg);opacity:0} }
  @keyframes pop { 0%{transform:scale(.7)} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }
  @keyframes flicker { 0%,100%{transform:translateX(-50%) scale(1) rotate(-3deg)} 50%{transform:translateX(-50%) scale(1.2) rotate(3deg)} }
  @keyframes slideup { 0%{transform:translate(-50%,20px);opacity:0} 100%{transform:translate(-50%,0);opacity:1} }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width:30px;height:30px;border:3px solid #E4DECF;border-top-color:#2FA85F;border-radius:50%;animation:spin .8s linear infinite; }
  button { cursor: pointer; font-family: inherit; border: none; background: none; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #d9d0b0; border-radius: 4px; }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .grid-13 { display:grid; grid-template-columns: 1fr 2fr; gap:16px; align-items:start; }
  .wrap { max-width:1100px; margin:0 auto; padding:24px 12px; }
  .pillbtn { border-radius:999px; background:#161512; color:#fff; font-weight:600; }
  .pillbtn-outline { border-radius:999px; background:#fff; color:#161512; border:1.5px solid #161512; font-weight:600; }
  .drag-row { transition: background .15s, opacity .15s; }
  .drag-row.dragover { background: rgba(76,140,60,.12) !important; }
  .drag-handle { cursor: grab; color:#b9ae90; font-size:15px; line-height:1; touch-action:none; }
  .drag-handle:active { cursor: grabbing; }
  @media (max-width:900px) {
    .grid-13 { grid-template-columns:1fr; }
  }
  @media (max-width:680px) {
    .grid-2 { grid-template-columns:1fr !important; }
    .wrap { padding:14px 8px; }
    .hero-title { font-size:24px !important; }
    .hero-pad { padding:16px !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

/* ============ YOUR FIREBASE CONFIG ============ */
const firebaseConfig = {
  apiKey: "AIzaSyDWXVhSkEuTGhCyPM5gCOTE_DfCujel_8E",
  authDomain: "my-planner-db4bf.firebaseapp.com",
  projectId: "my-planner-db4bf",
  storageBucket: "my-planner-db4bf.firebasestorage.app",
  messagingSenderId: "175660315281",
  appId: "1:175660315281:web:f288facb21f5bb15d7c530"
};
/* ============================================== */

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const googleProvider = new GoogleAuthProvider();

/* ---------- palette ---------- */
const PAL = { bg1:"#F8F4E9", bg2:"#EFE7D3", heroFrom:"#3E6B2E", heroVia:"#D9A62E", heroTo:"#C4581E", ink:"#1A1A17", habit:"#4C8C3C", week:"#C99A2E", month:"#D9791F", remind:"#B85420", work:"#161512", personal:"#6B7A3A", recur:"#8C6A2E", success:"#3E7A2F" };
const soft = (c,a="1A") => c + a;
const COLORS = ["#4C8C3C","#C99A2E","#D9791F","#B85420","#3E6B2E","#8C6A2E","#F2C94C","#6B7A3A"];
const PRIOS = [{id:"none",label:"None",color:"#cbd5d0"},{id:"low",label:"Low",color:"#4C8C3C"},{id:"high",label:"High",color:"#D9791F"},{id:"urgent",label:"Urgent",color:"#B0402A"}];
const prioColor = id => (PRIOS.find(p=>p.id===id)||{}).color || "#cbd5d0";
const REMINDERS = [{id:"lunch",h:11,m:30,label:"Order lunch",time:"11:30 AM"},{id:"coffee",h:14,m:30,label:"Order coffee",time:"2:30 PM"}];
const WEEKDAYS = [{n:1,s:"Mon"},{n:2,s:"Tue"},{n:3,s:"Wed"},{n:4,s:"Thu"},{n:5,s:"Fri"},{n:6,s:"Sat"},{n:0,s:"Sun"}];
const QUOTES = ["Plan the day, then work the plan.","Small steps, taken daily, build big results.","Focus on progress, not perfection.","What gets scheduled gets done.","Energy and time are your real budget — spend them well.","Do the hard thing first; the rest gets easier.","A balanced day is a productive day.","Clarity comes from action, not thought alone.","Protect your focus like your most valuable asset.","Today's effort is tomorrow's ease.","Done is better than perfect.","Finish what matters before it multiplies."];
const DEFAULT_ESS = { list:[{id:"phys",label:"Physical Activity (1 hour)"}], done:{} };

const ymd = d => { const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${dd}`; };
const addDays = (d,n) => { const x=new Date(d); x.setDate(x.getDate()+n); return x; };
const startOfWeek = d => { const x=new Date(d); const off=(x.getDay()+6)%7; x.setDate(x.getDate()-off); x.setHours(0,0,0,0); return x; };
const esc = s => (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

/* ---------- app state ---------- */
let uid = null, userEmail = "";
let data = { name:"", tasks:{}, ess:JSON.parse(JSON.stringify(DEFAULT_ESS)), weeklies:{}, monthlies:{}, recurring:[], meta:{remindersOn:false, seededMondays:{}, seededRecurring:{}} };
let view = "day";
let date = new Date();
let colPrio = { work:"none", personal:"none" };
let recCat = "work", recDay = 5;
let undoStack = [];
let saveTimer = null;
let firedReminders = {};
let dragInfo = null;

/* ---------- persistence ---------- */
async function loadData() {
  try {
    const snap = await getDoc(doc(db, "planners", uid));
    if (snap.exists()) {
      const d = snap.data();
      data = {
        name: d.name || "",
        tasks: d.tasks || {},
        ess: d.ess || JSON.parse(JSON.stringify(DEFAULT_ESS)),
        weeklies: d.weeklies || {},
        monthlies: d.monthlies || {},
        recurring: d.recurring || [],
        meta: d.meta || { remindersOn:false, seededMondays:{}, seededRecurring:{} },
      };
      data.ess.list = (data.ess.list||[]).filter(h => h.id!=="family" && h.id!=="work");
      if (!data.ess.list.length) data.ess.list = JSON.parse(JSON.stringify(DEFAULT_ESS.list));
      if (!data.meta.seededRecurring) data.meta.seededRecurring = {};
    }
  } catch(e) { console.error("load failed", e); toast("Could not load — check connection"); }
}
function saveData() {
  if (!uid) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    try { await setDoc(doc(db,"planners",uid), data); }
    catch(e){ console.error("save failed", e); toast("Save failed — retrying"); }
  }, 400);
}
function pushUndo(){ undoStack.push(JSON.stringify({name:data.name,tasks:data.tasks,ess:data.ess,weeklies:data.weeklies,monthlies:data.monthlies,recurring:data.recurring})); if(undoStack.length>25) undoStack.shift(); }
function undo(){ if(!undoStack.length) return; const p=JSON.parse(undoStack.pop()); data.name=p.name; data.tasks=p.tasks; data.ess=p.ess; data.weeklies=p.weeklies; data.monthlies=p.monthlies; data.recurring=p.recurring||[]; saveData(); render(); toast("Change undone"); }

/* ---------- confetti + toast ---------- */
function confetti(){
  const layer=document.getElementById("confetti"); if(!layer) return;
  for(let i=0;i<90;i++){ const el=document.createElement("div"); const s=6+Math.random()*9;
    el.style.cssText=`position:absolute;top:0;left:${Math.random()*100}%;width:${s}px;height:${s}px;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};border-radius:${Math.random()>.5?"50%":"2px"};transform:rotate(${Math.random()*360}deg);animation:confetti-fall ${1.3+Math.random()*1.4}s ${Math.random()*.25}s ease-in forwards;`;
    layer.appendChild(el); setTimeout(()=>el.remove(),2900); }
}
let toastTimer=null;
function toast(msg){ const t=document.getElementById("toast"); if(!t) return; t.textContent=msg; t.style.display="flex"; t.style.animation="slideup .3s ease"; clearTimeout(toastTimer); toastTimer=setTimeout(()=>{t.style.display="none";},5000); }

/* ---------- helpers on data ---------- */
const todayKey = () => ymd(new Date());
const curKey = () => ymd(date);
const isToday = () => curKey()===todayKey();

function seedMonday(){
  const mk = ymd(startOfWeek(date));
  const thisMon = ymd(startOfWeek(new Date()));
  if (mk < thisMon) return;
  if (data.meta.seededMondays && data.meta.seededMondays[mk]) return;
  const list = data.tasks[mk]||[];
  if (!list.some(t=>t.recurring==="weeklyTracker")) {
    data.tasks[mk] = [...list, {id:"wt-"+mk, text:"Send weekly tracker", cat:"work", done:false, prio:"high", review:false, recurring:"weeklyTracker"}];
  }
  data.meta.seededMondays = { ...(data.meta.seededMondays||{}), [mk]:true };
  saveData();
}
function seedRecurringForKey(k){
  if (k < todayKey()) return;
  const dow = new Date(k.replace(/-/g,"/")).getDay();
  let changed = false;
  (data.recurring||[]).forEach(r=>{
    if (r.weekday !== dow) return;
    const seedKey = r.id+"-"+k;
    if (data.meta.seededRecurring && data.meta.seededRecurring[seedKey]) return;
    const list = data.tasks[k]||[];
    if (!list.some(t=>t.recurringId===r.id)) {
      data.tasks[k] = [...list, {id:"rc-"+Date.now()+"-"+Math.random(), text:r.text, cat:r.cat, done:false, prio:r.prio||"none", review:false, recurringId:r.id}];
      changed = true;
    }
    data.meta.seededRecurring = { ...(data.meta.seededRecurring||{}), [seedKey]:true };
  });
  if (changed) saveData();
}
function addRecurring(text,cat,weekday){ const t=text.trim(); if(!t) return; pushUndo(); data.recurring=[...(data.recurring||[]),{id:"rec-"+Date.now(),text:t,cat,weekday}]; saveData(); render(); }
function removeRecurring(id){ pushUndo(); data.recurring=(data.recurring||[]).filter(r=>r.id!==id); saveData(); render(); }

/* tasks */
function addTask(k,txt,c,prio){ const t=txt.trim(); if(!t) return; pushUndo(); data.tasks[k]=[...(data.tasks[k]||[]),{id:Date.now()+"-"+Math.random(),text:t,cat:c,done:false,prio,review:false}]; saveData(); render(); }
function toggleTask(k,id){ let became=false; data.tasks[k]=(data.tasks[k]||[]).map(t=>{ if(t.id===id){became=!t.done; return {...t,done:!t.done};} return t;}); pushUndo(); saveData(); render(); if(became) confetti(); }
function toggleReview(k,id){ pushUndo(); data.tasks[k]=(data.tasks[k]||[]).map(t=>t.id===id?{...t,review:!t.review}:t); saveData(); render(); }
function removeTask(k,id){ pushUndo(); data.tasks[k]=(data.tasks[k]||[]).filter(t=>t.id!==id); saveData(); render(); }
function moveNext(k,id){ const list=data.tasks[k]||[]; const task=list.find(t=>t.id===id); if(!task) return; const nk=ymd(addDays(new Date(k.replace(/-/g,"/")),1)); pushUndo(); data.tasks[k]=list.filter(t=>t.id!==id); data.tasks[nk]=[...(data.tasks[nk]||[]),{...task,done:false}]; saveData(); render(); }
function reorderTask(k, draggedId, targetId){
  if (draggedId===targetId) return;
  const list=data.tasks[k]||[]; const dragged=list.find(t=>t.id===draggedId); const target=list.find(t=>t.id===targetId);
  if(!dragged||!target||dragged.cat!==target.cat) return;
  let newList=list.filter(t=>t.id!==draggedId);
  const idx=newList.findIndex(t=>t.id===targetId);
  newList.splice(idx,0,dragged);
  pushUndo(); data.tasks[k]=newList; saveData(); render();
}

/* habits */
function habitDone(id,k){ return !!(data.ess.done[k] && data.ess.done[k][id]); }
function toggleHabit(id){ const k=curKey(); const dd={...(data.ess.done[k]||{})}; const now=!dd[id]; dd[id]=now; pushUndo(); data.ess.done={...data.ess.done,[k]:dd}; saveData(); render(); if(now) confetti(); }
function addHabit(txt){ const t=txt.trim(); if(!t) return; pushUndo(); data.ess.list=[...data.ess.list,{id:"h-"+Date.now(),label:t}]; saveData(); render(); }
function removeHabit(id){ pushUndo(); data.ess.list=data.ess.list.filter(h=>h.id!==id); saveData(); render(); }
function streakOf(id){ let c=0,cur=new Date(date); if(!habitDone(id,ymd(cur))) cur=addDays(cur,-1); while(habitDone(id,ymd(cur))){c++;cur=addDays(cur,-1);} return c; }

/* periods (week/month) */
function periodStore(kind){ return kind==="week"?data.weeklies:data.monthlies; }
function periodKey(kind){ if(kind==="week") return ymd(startOfWeek(date)); return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}`; }
function periodNextKey(kind){ if(kind==="week") return ymd(addDays(startOfWeek(date),7)); const n=new Date(date.getFullYear(),date.getMonth()+1,1); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`; }
const pStatus = w => w.status || (w.done?"done":"idle");
const pDays = w => (typeof w.days==="number"?w.days:0);
function pList(kind){ return periodStore(kind)[periodKey(kind)]||[]; }
function pAdd(kind,txt){ const t=txt.trim(); if(!t) return; pushUndo(); const k=periodKey(kind); periodStore(kind)[k]=[...(periodStore(kind)[k]||[]),{id:"p-"+Date.now()+"-"+Math.random(),text:t,status:"idle",days:0}]; saveData(); render(); }
function pSet(kind,id,patch){ pushUndo(); const k=periodKey(kind); periodStore(kind)[k]=(periodStore(kind)[k]||[]).map(w=>w.id===id?{...w,...patch}:w); saveData(); render(); }
function pStart(kind,id){ pSet(kind,id,{status:"active",days:0}); }
function pLog(kind,id){ const w=pList(kind).find(x=>x.id===id); pSet(kind,id,{days:pDays(w)+1}); }
function pFinish(kind,id){ pSet(kind,id,{status:"done"}); confetti(); }
function pReopen(kind,id){ pSet(kind,id,{status:"active"}); }
function pRemove(kind,id){ pushUndo(); const k=periodKey(kind); periodStore(kind)[k]=(periodStore(kind)[k]||[]).filter(w=>w.id!==id); saveData(); render(); }
function pShift(kind,id){ const k=periodKey(kind), nk=periodNextKey(kind); const item=(periodStore(kind)[k]||[]).find(x=>x.id===id); if(!item) return; pushUndo(); periodStore(kind)[k]=(periodStore(kind)[k]||[]).filter(x=>x.id!==id); periodStore(kind)[nk]=[...(periodStore(kind)[nk]||[]),item]; saveData(); render(); toast("Shifted forward"); }
function pCarryCount(kind){ const store=periodStore(kind), pk=periodKey(kind); let n=0; Object.keys(store).forEach(k=>{ if(k<pk)(store[k]||[]).forEach(w=>{ if(pStatus(w)!=="done") n++; }); }); return n; }
function pCarry(kind){ const store=periodStore(kind), pk=periodKey(kind); pushUndo(); const bring=[]; Object.keys(store).forEach(k=>{ if(k<pk){ const stay=[]; (store[k]||[]).forEach(w=> pStatus(w)==="done"?stay.push(w):bring.push(w)); store[k]=stay; } }); store[pk]=[...(store[pk]||[]),...bring]; saveData(); render(); toast("Brought earlier tasks in"); }
function reorderPeriod(kind, draggedId, targetId){
  if (draggedId===targetId) return;
  const k=periodKey(kind); let list=[...(periodStore(kind)[k]||[])];
  const dragged=list.find(w=>w.id===draggedId); if(!dragged) return;
  list=list.filter(w=>w.id!==draggedId);
  const idx=list.findIndex(w=>w.id===targetId);
  if(idx<0) list.push(dragged); else list.splice(idx,0,dragged);
  pushUndo(); periodStore(kind)[k]=list; saveData(); render();
}

/* overdue */
function overdueList(){ const out=[]; Object.keys(data.tasks).forEach(k=>{ if(k<todayKey())(data.tasks[k]||[]).forEach(t=>{ if(!t.done) out.push(t); }); }); return out; }
function rollOverdue(){ pushUndo(); const tk=todayKey(); const moved=[]; Object.keys(data.tasks).forEach(k=>{ if(k<tk){ const stay=[]; (data.tasks[k]||[]).forEach(t=> t.done?stay.push(t):moved.push({...t,done:false})); data.tasks[k]=stay; } }); data.tasks[tk]=[...(data.tasks[tk]||[]),...moved]; date=new Date(); saveData(); render(); }

/* backup */
function exportData(){ try{ const blob=new Blob([JSON.stringify({app:"my-planner",v:1,exportedAt:new Date().toISOString(),...data},null,2)],{type:"application/json"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=`planner-backup-${ymd(new Date())}.json`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); toast("Backup downloaded"); }catch(e){ toast("Could not download"); } }
function importFile(input){ const f=input.files&&input.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>{ try{ const d=JSON.parse(r.result); pushUndo(); if(d.name!==undefined) data.name=d.name; if(d.tasks) data.tasks=d.tasks; if(d.ess) data.ess=d.ess; if(d.weeklies) data.weeklies=d.weeklies; if(d.monthlies) data.monthlies=d.monthlies; if(d.recurring) data.recurring=d.recurring; if(d.meta) data.meta=d.meta; saveData(); render(); toast("Records restored"); }catch(e){ toast("Could not read that file"); } }; r.readAsText(f); input.value=""; }

/* reminders */
let reminderTimer=null;
function startReminderLoop(){ clearInterval(reminderTimer); reminderTimer=setInterval(()=>{ if(!data.meta.remindersOn) return; const now=new Date(); const dow=now.getDay(); if(dow<1||dow>5) return; const dk=ymd(now); REMINDERS.forEach(r=>{ if(now.getHours()===r.h && now.getMinutes()===r.m){ const fk=dk+"-"+r.id; if(!firedReminders[fk]){ firedReminders[fk]=true; fireReminder(r);} } }); },15000); }
let audioCtx=null;
function chime(){ try{ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); const ctx=audioCtx; const t0=ctx.currentTime; [880,1175,1568].forEach((f,i)=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.type="sine"; o.frequency.value=f; o.connect(g); g.connect(ctx.destination); const t=t0+i*0.16; g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(.3,t+.02); g.gain.exponentialRampToValueAtTime(.001,t+.4); o.start(t); o.stop(t+.42);}); }catch(e){} }
function fireReminder(r){ chime(); toast("Reminder: "+r.label); try{ if("Notification" in window && Notification.permission==="granted") new Notification("Planner reminder",{body:r.label}); }catch(e){} }
async function toggleReminders(){ if(data.meta.remindersOn){ data.meta.remindersOn=false; } else { try{ if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==="suspended") await audioCtx.resume(); }catch(e){} try{ if("Notification" in window && Notification.permission==="default") await Notification.requestPermission(); }catch(e){} data.meta.remindersOn=true; chime(); } saveData(); render(); }

/* ---------- rendering ---------- */
const sections = [{id:"work",label:"Work",color:PAL.work},{id:"personal",label:"Personal",color:PAL.personal}];
const catColor = c => c==="work"?PAL.work:PAL.personal;

function ringSvg(pct,color,size,stroke,inner,track){
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-pct/100);
  track=track||"#ECECE9";
  return `<div style="position:relative;width:${size}px;height:${size}px;flex:0 0 auto;">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${track}" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .6s ease"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">${inner}</div>
  </div>`;
}
const card = (inner,accent) => `<div style="border-radius:16px;background:#FBF8EF;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid ${accent?soft(accent,"40"):"#E6DFC8"};padding:16px;min-width:0;">${inner}</div>`;

function taskRowHtml(t){
  const color=catColor(t.cat); const isWork=t.cat==="work";
  return `<div class="taskrow drag-row" draggable="true" data-drag="task" data-k="${curKey()}" data-id="${t.id}" style="display:flex;align-items:center;gap:8px;border-radius:12px;padding:8px;${t.prio==="urgent"?"background:#F6E7DF;":""}">
    <span class="drag-handle">⠿</span>
    <button data-act="toggleTask" data-k="${curKey()}" data-id="${t.id}" style="flex:0 0 auto;width:20px;height:20px;border-radius:6px;border:2px solid ${t.done?color:(t.review?PAL.remind:"#cbd5d0")};background:${t.done?color:"transparent"};display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;">${t.done?"✓":""}</button>
    ${t.prio&&t.prio!=="none"?`<span style="flex:0 0 auto;width:9px;height:9px;border-radius:2px;background:${prioColor(t.prio)};"></span>`:""}
    ${t.recurringId?`<span title="Recurring" style="flex:0 0 auto;font-size:12px;">🔁</span>`:""}
    <span style="flex:1;font-size:14px;min-width:0;overflow-wrap:break-word;${t.done?"text-decoration:line-through;color:#a8a29e;":"color:#292520;"}">${esc(t.text)}</span>
    ${isWork&&t.review&&!t.done?`<span style="flex:0 0 auto;font-size:10px;font-weight:600;padding:2px 6px;border-radius:999px;background:${soft(PAL.remind,"22")};color:#8A4A16;">In review</span>`:""}

  <div id="toast" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:60;align-items:center;gap:12px;padding:12px 16px;border-radius:999px;box-shadow:0 10px 30px rgba(0,0,0,.25);color:#fff;background:${PAL.work};font-weight:500;font-size:14px;max-width:90vw;"></div>

    <div style="position:relative;overflow:hidden;border-radius:24px;box-shadow:0 12px 30px rgba(0,0,0,.15);margin-bottom:16px;color:#fff;background:linear-gradient(115deg,${PAL.heroFrom},${PAL.heroVia},${PAL.heroTo});">
      <div class="hero-pad" style="position:relative;z-index:1;padding:20px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:44px;height:44px;border-radius:14px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;text-transform:uppercase;flex:0 0 auto;">${esc(nm[0]||"Y")}</div>
            <div><div style="font-size:12px;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,.75);">${greet}</div>
            <div id="nameDisplay" data-act="editName" class="hero-title" style="font-size:18px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;">${esc(nm)}'s Planner <span style="font-size:12px;font-weight:400;opacity:.8;text-decoration:underline;">edit</span></div></div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            ${undoStack.length?`<button data-act="undo" title="Undo" style="padding:8px;border-radius:999px;background:rgba(255,255,255,.18);color:#fff;">↺</button>`:""}
            <button data-act="signout" title="Sign out" style="padding:6px 14px;border-radius:999px;background:rgba(255,255,255,.18);color:#fff;font-size:13px;">Sign out</button>
            <div style="display:flex;border-radius:999px;background:rgba(255,255,255,.18);padding:4px;">
              <button data-act="setView" data-view="day" style="padding:6px 16px;border-radius:999px;font-size:14px;font-weight:600;${view==="day"?"background:#161512;color:#fff;":"color:rgba(255,255,255,.85);"}">Day</button>
              <button data-act="setView" data-view="week" style="padding:6px 16px;border-radius:999px;font-size:14px;font-weight:600;${view==="week"?"background:#161512;color:#fff;":"color:rgba(255,255,255,.85);"}">Week</button>
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <button data-act="prev" style="padding:8px;border-radius:999px;background:rgba(255,255,255,.14);color:#fff;">‹</button>
            <div style="padding:0 4px;"><div style="font-size:28px;font-weight:700;line-height:1;font-family:Georgia,serif;">${view==="day"?date.toLocaleDateString("en-US",{weekday:"long"}):"This Week"}</div>
              <div style="display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap;"><span style="font-size:14px;color:rgba(255,255,255,.85);">${view==="day"?date.toLocaleDateString("en-US",{month:"long",day:"numeric"}):weekLabel}</span>
              ${view==="day"&&isToday()?`<span style="font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.22);">Today</span>`:`<button data-act="today" style="font-size:12px;color:rgba(255,255,255,.75);">${view==="day"?"Today":"This week"}</button>`}</div>
            </div>
            <button data-act="next" style="padding:8px;border-radius:999px;background:rgba(255,255,255,.14);color:#fff;">›</button>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="text-align:right;"><div style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.65);">${view==="day"?"Day score":"Week score"}</div>
            <div style="font-weight:700;font-size:18px;line-height:1.2;">${status}</div><div style="font-size:12px;color:rgba(255,255,255,.75);">${heroDone} of ${heroTotal} complete</div></div>
            ${ringSvg(hPct,"#fff",76,7,`<div style="font-size:20px;font-weight:700;color:#fff;">${hPct}<span style="font-size:13px;">%</span></div>`,"rgba(255,255,255,.28)")}
          </div>
        </div>
      </div>
    </div>

    ${view==="day"?`<div style="position:relative;border-radius:16px;padding:14px 16px;margin-bottom:16px;border:1px solid #E6DFC8;box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;align-items:center;gap:12px;background:#FBF8EF;"><span>✨</span><p style="font-style:italic;font-weight:500;margin:0;color:#5C4A20;font-size:14px;font-family:Georgia,serif;">${esc(quote)}</p></div>`:""}

    ${((view==="day"&&isToday())||view==="week")&&overdueList().length?`<div style="margin-bottom:16px;border-radius:16px;border:1px solid ${soft(PAL.remind,"55")};background:${soft(PAL.remind,"14")};padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;"><div style="font-size:14px;color:#8A4A16;">You have <b>${overdueList().length}</b> unfinished task(s) from earlier.</div><button data-act="rollOverdue" class="pillbtn" style="flex:0 0 auto;font-size:14px;padding:6px 14px;background:${PAL.remind};">Move to today →</button></div>`:""}

    ${view==="day"&&allDone?`<div style="margin-bottom:16px;border-radius:16px;border:1px solid ${soft(PAL.success,"45")};background:${soft(PAL.success,"16")};padding:12px 16px;display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#295C20;">🎉 Everything done for today. Excellent work, ${esc(nm)}!</div>`:""}

    ${view==="day"?`<div style="display:flex;flex-direction:column;gap:16px;">
      ${habitsCardHtml()}
      <div class="grid-13">
        ${periodColumnHtml()}
        <div style="display:flex;flex-direction:column;gap:16px;">
          ${remindersCardHtml()}
          ${recurringCardHtml()}
          ${taskColumnsHtml()}
        </div>
      </div>
    </div>`:weekViewHtml(weekDays)}

    <div style="margin-top:20px;display:flex;align-items:center;justify-content:center;gap:12px;font-size:12px;color:#a8a29e;flex-wrap:wrap;">
      <button data-act="undo" ${undoStack.length?"":"disabled"} style="display:flex;align-items:center;gap:4px;color:#a8a29e;${undoStack.length?"":"opacity:.4;"}">↺ Undo</button><span>·</span>
      <button data-act="export" style="display:flex;align-items:center;gap:4px;color:#a8a29e;">⬇ Backup</button><span>·</span>
      <button data-act="restore" style="display:flex;align-items:center;gap:4px;color:#a8a29e;">⬆ Restore</button>
      <input id="fileInput" type="file" accept="application/json,.json" style="display:none;"/>
    </div>
    <p style="text-align:center;font-size:12px;color:#a8a29e;margin-top:8px;">Saved to the cloud · Syncs across your devices · Signed in as ${esc(userEmail)}</p>
  </div>`;

  wire();
}

function startEditName(){
  const el = document.getElementById("nameDisplay");
  if (!el) return;
  const current = data.name || "";
  el.outerHTML = `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
    <input id="nameInput" value="${esc(current)}" placeholder="Your name" style="font-size:16px;font-weight:700;padding:6px 12px;border-radius:999px;border:none;background:rgba(255,255,255,.28);color:#fff;width:160px;"/>
    <button data-act="saveName" style="font-size:12px;font-weight:700;padding:6px 14px;border-radius:999px;background:#161512;color:#fff;">Save</button>
  </div>`;
  const inp = document.getElementById("nameInput");
  inp.focus(); inp.select();
  inp.onkeydown = e => { if(e.key==="Enter") saveName(); if(e.key==="Escape") render(); };
  document.querySelector('[data-act="saveName"]').onclick = saveName;
}
function saveName(){
  const inp = document.getElementById("nameInput");
  const v = inp ? inp.value.trim() : "";
  if (v) { pushUndo(); data.name = v; saveData(); }
  render();
}

function setupDrag(){
  document.querySelectorAll('[data-drag]').forEach(el=>{
    el.addEventListener('dragstart', e=>{
      const type=el.getAttribute('data-drag');
      dragInfo = type==="task" ? {type, k:el.getAttribute('data-k'), id:el.getAttribute('data-id')} : {type, kind:el.getAttribute('data-kind'), id:el.getAttribute('data-id')};
      setTimeout(()=>{ el.style.opacity='0.35'; },0);
    });
    el.addEventListener('dragend', ()=>{ el.style.opacity='1'; dragInfo=null; document.querySelectorAll('.dragover').forEach(x=>x.classList.remove('dragover')); });
    el.addEventListener('dragover', e=>{ e.preventDefault(); if(dragInfo && dragInfo.type===el.getAttribute('data-drag')) el.classList.add('dragover'); });
    el.addEventListener('dragleave', ()=>{ el.classList.remove('dragover'); });
    el.addEventListener('drop', e=>{
      e.preventDefault(); el.classList.remove('dragover');
      if(!dragInfo) return;
      const type=el.getAttribute('data-drag'); if(dragInfo.type!==type) return;
      const targetId=el.getAttribute('data-id');
      if(type==="task"){ const k=el.getAttribute('data-k'); if(k===dragInfo.k) reorderTask(k, dragInfo.id, targetId); }
      else if(type==="period"){ const kind=el.getAttribute('data-kind'); if(kind===dragInfo.kind) reorderPeriod(kind, dragInfo.id, targetId); }
    });
  });
}

function wire(){
  const $=s=>document.getElementById(s);
  document.querySelectorAll("[data-act]").forEach(el=>{
    const act=el.getAttribute("data-act");
    if (act==="setRecDay") { el.onchange=()=>{ recDay=parseInt(el.value,10); }; return; }
    el.onclick=(ev)=>{
      const k=el.getAttribute("data-k"), id=el.getAttribute("data-id"), kind=el.getAttribute("data-kind"), cat=el.getAttribute("data-cat");
      if(act==="setView"){ view=el.getAttribute("data-view"); render(); }
      else if(act==="prev"){ date=addDays(date, view==="day"?-1:-7); render(); }
      else if(act==="next"){ date=addDays(date, view==="day"?1:7); render(); }
      else if(act==="today"){ date=new Date(); render(); }
      else if(act==="toggleTask"||act==="toggleTaskWk"){ toggleTask(k,id); }
      else if(act==="review"){ toggleReview(k,id); }
      else if(act==="moveNext"){ moveNext(k,id); }
      else if(act==="removeTask"){ removeTask(k,id); }
      else if(act==="openDay"){ date=new Date(k.replace(/-/g,"/")); view="day"; render(); }
      else if(act==="toggleHabit"){ toggleHabit(id); }
      else if(act==="removeHabit"){ removeHabit(id); }
      else if(act==="addHabitBtn"){ const i=$("habitInput"); addHabit(i.value); }
      else if(act==="pStart"){ pStart(kind,id); }
      else if(act==="pLog"){ pLog(kind,id); }
      else if(act==="pFinish"){ pFinish(kind,id); }
      else if(act==="pReopen"){ pReopen(kind,id); }
      else if(act==="pRemove"){ pRemove(kind,id); }
      else if(act==="pShift"){ pShift(kind,id); }
      else if(act==="pCarry"){ pCarry(kind); }
      else if(act==="pAddBtn"){ const i=$(kind+"Input"); pAdd(kind,i.value); }
      else if(act==="setPrio"){ colPrio[cat]=el.getAttribute("data-prio"); render(); }
      else if(act==="addColBtn"){ const i=$("col-"+cat); addTask(curKey(), i.value, cat, colPrio[cat]); }
      else if(act==="toggleReminders"){ toggleReminders(); }
      else if(act==="testSound"){ fireReminder({label:"Test reminder"}); }
      else if(act==="rollOverdue"){ rollOverdue(); }
      else if(act==="undo"){ undo(); }
      else if(act==="export"){ exportData(); }
      else if(act==="restore"){ $("fileInput").click(); }
      else if(act==="signout"){ signOut(auth); }
      else if(act==="editName"){ startEditName(); }
      else if(act==="setRecCat"){ recCat=cat; render(); }
      else if(act==="addRecurringBtn"){ const i=$("recText"); addRecurring(i.value, recCat, recDay); }
      else if(act==="removeRecurringBtn"){ removeRecurring(id); }
    };
    // prevent drag-handle button clicks from toggling parent drag start issues
    if (el.classList && el.classList.contains("taskrow")) { /* noop */ }
  });
  const enterMap=[["habitInput",()=>addHabit($("habitInput").value)],["weekInput",()=>pAdd("week",$("weekInput").value)],["monthInput",()=>pAdd("month",$("monthInput").value)],["col-work",()=>addTask(curKey(),$("col-work").value,"work",colPrio.work)],["col-personal",()=>addTask(curKey(),$("col-personal").value,"personal",colPrio.personal)],["recText",()=>{ const i=$("recText"); addRecurring(i.value, recCat, recDay); }]];
  enterMap.forEach(([idn,fn])=>{ const el=$(idn); if(el) el.onkeydown=e=>{ if(e.key==="Enter") fn(); }; });
  const fi=$("fileInput"); if(fi) fi.onchange=()=>importFile(fi);
  setupDrag();
}

/* ---------- auth screen ---------- */
function renderLogin(){
  const root=document.getElementById("root");
  root.innerHTML=`
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(115deg,${PAL.heroFrom},${PAL.heroVia},${PAL.heroTo});">
    <div style="width:100%;max-width:380px;border-radius:24px;background:#FBF8EF;box-shadow:0 20px 50px rgba(0,0,0,.3);padding:28px;text-align:center;">
      <div style="width:56px;height:56px;border-radius:16px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;background:${soft(PAL.habit,"1F")};font-size:26px;">🗓</div>
      <h1 style="font-size:22px;font-weight:700;margin:0;color:#1A1A17;font-family:Georgia,serif;">My Planner</h1>
      <p style="font-size:14px;color:#78716c;margin:6px 0 20px;">Sign in — your tasks sync across all your devices.</p>
      <button id="googleBtn" style="width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:999px;border:1.5px solid #1A1A17;background:#fff;font-weight:600;font-size:15px;color:#1A1A17;margin-bottom:14px;">
        <span style="font-weight:700;color:#4285F4;">G</span> Continue with Google</button>
      <div style="display:flex;align-items:center;gap:10px;color:#cbd5d0;font-size:12px;margin-bottom:14px;"><div style="flex:1;height:1px;background:#E6DFC8;"></div>or<div style="flex:1;height:1px;background:#E6DFC8;"></div></div>
      <input id="email" type="email" placeholder="Email" style="width:100%;padding:12px;border-radius:999px;border:1px solid #DDD3AF;margin-bottom:10px;font-size:15px;"/>
      <input id="pass" type="password" placeholder="Password (min 6 characters)" style="width:100%;padding:12px;border-radius:999px;border:1px solid #DDD3AF;margin-bottom:14px;font-size:15px;"/>
      <button id="signinBtn" class="pillbtn" style="width:100%;padding:12px;font-size:15px;margin-bottom:8px;">Sign in</button>
      <button id="signupBtn" class="pillbtn-outline" style="width:100%;padding:12px;font-size:14px;">Create a new account</button>
      <p id="authErr" style="color:#B0402A;font-size:13px;margin-top:12px;min-height:16px;"></p>
    </div>
  </div>`;
  const $=s=>document.getElementById(s);
  const showErr=m=>{ $("authErr").textContent=m; };
  $("googleBtn").onclick=async()=>{ showErr(""); try{ await signInWithPopup(auth,googleProvider); }catch(e){ showErr(prettyErr(e)); } };
  $("signinBtn").onclick=async()=>{ showErr(""); try{ await signInWithEmailAndPassword(auth,$("email").value.trim(),$("pass").value); }catch(e){ showErr(prettyErr(e)); } };
  $("signupBtn").onclick=async()=>{ showErr(""); try{ await createUserWithEmailAndPassword(auth,$("email").value.trim(),$("pass").value); }catch(e){ showErr(prettyErr(e)); } };
  [$("email"),$("pass")].forEach(el=> el.onkeydown=e=>{ if(e.key==="Enter") $("signinBtn").click(); });
}
function prettyErr(e){ const c=(e&&e.code)||""; if(c.includes("invalid-credential")||c.includes("wrong-password")||c.includes("user-not-found")) return "Wrong email or password. New here? Tap Create a new account."; if(c.includes("email-already-in-use")) return "That email already has an account — just Sign in."; if(c.includes("weak-password")) return "Password should be at least 6 characters."; if(c.includes("invalid-email")) return "That doesn't look like a valid email."; if(c.includes("popup-closed")||c.includes("cancelled")) return "Google sign-in was cancelled."; if(c.includes("unauthorized-domain")) return "This web address isn't authorized in Firebase yet (add it under Authentication → Settings → Authorized domains)."; return "Sign-in error: "+(e.message||c); }

/* ---------- boot ---------- */
document.getElementById("root").innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;"><div class="spinner"></div></div>';
onAuthStateChanged(auth, async (user)=>{
  if(user){ uid=user.uid; userEmail=user.email||""; document.getElementById("root").innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;"><div class="spinner"></div></div>'; await loadData(); if(!data.name){ data.name=(user.displayName||userEmail.split("@")[0]||"").split(" ")[0]; } startReminderLoop(); render(); }
  else { uid=null; renderLogin(); }
});
</script>
